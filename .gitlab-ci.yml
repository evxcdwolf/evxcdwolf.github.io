# GitLab CI/CD Pipeline for GitLab Pages Deployment
# Target user / group: evxcdwolf

image: node:20-alpine

pages:
  stage: deploy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci || npm install
    - npm run build
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
